<script>

function activateDurkaMode(){

document.body.classList.add("durka");

const emojis = ["🤡","🔥","🥚","🌀","💀","🐸","🚀"];

setInterval(() => {

const e = document.createElement("div");

e.className = "durka-emoji";
e.innerText = emojis[Math.floor(Math.random()*emojis.length)];

e.style.left = Math.random()*100 + "vw";

document.body.appendChild(e);

setTimeout(()=>{
e.remove();
},4000);

},200);

alert("DURKA MODE ACTIVATED");

}

// 5 clicks on title
let clicks = 0;

document.getElementById("logo").onclick = () => {

clicks++;

if(clicks === 5){
activateDurkaMode();
}

};

// konami code
const code = [
"ArrowUp","ArrowUp",
"ArrowDown","ArrowDown",
"ArrowLeft","ArrowRight",
"ArrowLeft","ArrowRight",
"b","a"
];

let input = [];

window.addEventListener("keydown", e => {

input.push(e.key);

if(input.length > code.length){
input.shift();
}

if(JSON.stringify(input) === JSON.stringify(code)){
activateDurkaMode();
}

});

document.querySelector(".easter").onclick = () => {
alert("You found the Easter egg 🥚");
};
</script>
